services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beetrack
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
    healthcheck:
      interval: 5s
      retries: 5
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      timeout: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/beetrack?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  postgres_data:
